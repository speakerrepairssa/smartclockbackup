<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>SmartClock — Live Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;font-family:"Inter",sans-serif;background:#0f172a;color:#f1f5f9;overflow:hidden;}

    /* PAGE SHELL */
    .page{display:flex;flex-direction:column;height:100vh;padding:1.25rem;gap:1.1rem;overflow:hidden;}

    /* HEADER */
    .mon-header{
      background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;padding:1rem 1.4rem;
      display:flex;justify-content:space-between;align-items:center;
      flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,0.35);
    }
    .hdr-left{display:flex;align-items:center;gap:1rem;}
    .hdr-brand{font-size:1.2rem;font-weight:800;letter-spacing:-0.02em;color:#f1f5f9;}
    .hdr-brand span{color:#14b8a6;}
    .live-badge{
      display:inline-flex;align-items:center;gap:0.4rem;
      background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);
      border-radius:20px;padding:0.2rem 0.65rem;
      font-size:0.7rem;font-weight:700;color:#ef4444;
      letter-spacing:0.08em;text-transform:uppercase;
    }
    .live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:livePulse 1.4s ease-in-out infinite;}
    @keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}
    .hdr-clock{
      font-family:"Courier New",monospace;font-size:1.1rem;font-weight:700;
      color:#94a3b8;background:rgba(255,255,255,0.05);
      padding:0.3rem 0.9rem;border-radius:8px;letter-spacing:0.06em;
    }
    .hdr-right{display:flex;gap:0.6rem;align-items:center;}
    .hdr-btn{
      background:rgba(255,255,255,0.08);color:#cbd5e1;
      border:1px solid rgba(255,255,255,0.12);
      padding:0.45rem 1rem;border-radius:8px;
      font-size:0.82rem;font-weight:600;cursor:pointer;transition:background 0.2s;
    }
    .hdr-btn:hover{background:rgba(255,255,255,0.15);}

    /* STATS BAR */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;flex-shrink:0;}
    .stat-card{
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
      border-radius:12px;padding:0.9rem 1.1rem;
      display:flex;align-items:center;gap:0.8rem;border-left:4px solid transparent;
    }
    .stat-card.sc-total{border-left-color:#64748b;}
    .stat-card.sc-in   {border-left-color:#22c55e;}
    .stat-card.sc-out  {border-left-color:#ef4444;}
    .stat-card.sc-rate {border-left-color:#3b82f6;}
    .sc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .sc-total .sc-icon{background:rgba(100,116,139,0.2);}
    .sc-in    .sc-icon{background:rgba(34,197,94,0.15);}
    .sc-out   .sc-icon{background:rgba(239,68,68,0.15);}
    .sc-rate  .sc-icon{background:rgba(59,130,246,0.15);}
    .sc-lbl{font-size:0.68rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
    .sc-val{font-size:1.45rem;font-weight:800;line-height:1.1;margin-top:0.1rem;color:#f1f5f9;}
    .sc-in  .sc-val{color:#22c55e;}
    .sc-out .sc-val{color:#ef4444;}
    .sc-rate .sc-val{color:#3b82f6;font-size:1.2rem;}

    /* OUTER GRID */
    .outer-grid{display:flex;flex-direction:row;gap:0;flex:1;min-height:0;}

    /* LEFT: IN / OUT */
    .left-col{display:flex;flex-direction:row;gap:0;min-height:0;flex:1;min-width:0;}
    .status-section{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:0;
      flex:1;min-width:0;
    }
    .status-hdr{
      padding:0.8rem 1.2rem;color:white;font-weight:700;font-size:0.82rem;
      letter-spacing:0.07em;text-transform:uppercase;
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    }
    .status-hdr.in {background:linear-gradient(90deg,#15803d,#22c55e);}
    .status-hdr.out{background:linear-gradient(90deg,#b91c1c,#ef4444);}
    .status-hdr-cnt{background:rgba(255,255,255,0.25);border-radius:20px;padding:0.12rem 0.55rem;font-size:0.78rem;}
    .status-body{flex:1;overflow-y:auto;min-height:0;}
    .status-body::-webkit-scrollbar{width:4px;}
    .status-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
    .emp-item{
      padding:0.8rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.05);
      display:flex;align-items:center;gap:0.8rem;
      transition:background 0.15s;animation:rowIn 0.25s ease;
    }
    @keyframes rowIn{from{opacity:0;transform:translateX(-5px);}to{opacity:1;transform:translateX(0);}}
    .emp-item:hover{background:rgba(255,255,255,0.04);}
    .emp-item:last-child{border-bottom:none;}
    .emp-av{
      width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:0.78rem;font-weight:700;flex-shrink:0;text-transform:uppercase;
    }
    .in-section  .emp-av{background:rgba(34,197,94,0.15);color:#22c55e;border:2px solid rgba(34,197,94,0.3);}
    .out-section .emp-av{background:rgba(239,68,68,0.15);color:#ef4444;border:2px solid rgba(239,68,68,0.3);}
    .emp-details{flex:1;min-width:0;}
    .emp-name{font-weight:600;color:#f1f5f9;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .emp-slot{color:#475569;font-size:0.72rem;margin-top:1px;text-transform:uppercase;letter-spacing:0.04em;}
    .emp-time{font-family:"Courier New",monospace;font-size:0.98rem;font-weight:700;flex-shrink:0;}
    .in-section  .emp-time{color:#22c55e;}
    .out-section .emp-time{color:#ef4444;}
    .no-emp{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;color:#334155;font-size:0.85rem;gap:0.5rem;}
    .no-emp span:first-child{font-size:1.8rem;}

    /* RIGHT PANEL */
    .right-col{display:flex;flex-direction:column;gap:1rem;min-height:0;overflow-y:auto;flex-shrink:0;width:340px;}
    .right-col::-webkit-scrollbar{width:4px;}
    .right-col::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
    .rp-card{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;
    }
    /* LAYOUT RESIZE HANDLES */
    .layout-col-spl{width:14px;cursor:col-resize;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin:0 2px;border-radius:4px;transition:background 0.2s;}
    .layout-col-spl::after{content:'';width:4px;height:60px;background:rgba(255,255,255,0.15);border-radius:2px;transition:background 0.2s;}
    .layout-col-spl:hover::after,.layout-col-spl.dragging::after{background:rgba(59,130,246,0.8);}
    #outerColSpl{align-self:stretch;}
    #innerColSpl{align-self:stretch;}
    /* ZOOM BUTTONS */
    .zoom-btns{display:flex;gap:3px;flex-shrink:0;}
    .zoom-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.65);border-radius:5px;padding:0.08rem 0.42rem;font-size:0.63rem;font-weight:800;cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;}
    .zoom-btn:hover{background:rgba(59,130,246,0.45);border-color:rgba(59,130,246,0.6);color:#fff;}
    .layout-resize-hdl{height:10px;cursor:ns-resize;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.02);transition:background 0.2s;}
    .layout-resize-hdl::after{content:'';width:40px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;transition:background 0.2s;}
    .layout-resize-hdl:hover::after,.layout-resize-hdl.dragging::after{background:rgba(59,130,246,0.7);}
    .rp-hdr{
      background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;
    }
    .rp-title{font-size:0.78rem;font-weight:700;color:#f1f5f9;letter-spacing:0.05em;text-transform:uppercase;}
    .chart-btns{display:flex;gap:0.3rem;}
    .chart-btn{
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.6);border-radius:6px;
      padding:0.18rem 0.55rem;font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.2s;
    }
    .chart-btn.active,.chart-btn:hover{background:rgba(59,130,246,0.45);border-color:rgba(59,130,246,0.6);color:white;}
    .chart-wrap{
      padding:0.9rem;position:relative;
      display:flex;align-items:center;justify-content:center;
      flex:1;overflow:hidden;min-height:120px;
    }
    .chart-empty{
      position:absolute;color:#334155;font-size:0.82rem;
      text-align:center;display:none;flex-direction:column;align-items:center;gap:0.4rem;
    }
    .chart-empty span{font-size:2rem;opacity:0.35;}

    /* Spotlight */
    .spotlight-body{padding:0.8rem 1rem;display:flex;flex-direction:column;gap:0.5rem;flex:1;overflow-y:auto;min-height:80px;}
    .spot-section-lbl{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#475569;padding:0 0.1rem 0.1rem;}
    .spot-row{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0.8rem;border-radius:10px;}
    .spot-row.top {background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);}
    .spot-row.bot {background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.2);}
    .spot-row.none{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
    .spot-icon{font-size:1.3rem;flex-shrink:0;}
    .spot-lbl{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;}
    .spot-row.top  .spot-lbl{color:#22c55e;}
    .spot-row.bot  .spot-lbl{color:#fb923c;}
    .spot-row.none .spot-lbl{color:#475569;}
    .spot-name{font-size:0.85rem;font-weight:700;color:#f1f5f9;margin-top:2px;}
    .spot-time{font-family:"Courier New",monospace;font-size:0.75rem;color:#64748b;margin-top:1px;}

    /* FOOTER */
    .mon-footer{
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      border-radius:10px;padding:0.65rem 1.2rem;
      font-size:0.8rem;color:#475569;flex-shrink:0;
    }
    .footer-live{display:flex;align-items:center;gap:0.5rem;font-weight:600;color:#22c55e;}
    .footer-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5);animation:livePulse 1.4s ease-in-out infinite;}
    .footer-dot.off{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5);}
    .refresh-time{color:#3b82f6;font-weight:600;}

    @media(max-width:1100px){.outer-grid{flex-direction:column;}.layout-col-spl[id=outerColSpl]{display:none;}.right-col{flex-direction:row;flex-wrap:wrap;overflow-y:visible;width:auto!important;flex-shrink:1!important;}.rp-card{flex:1;min-width:280px;}}
    @media(max-width:700px){.left-col{flex-direction:column;}.layout-col-spl[id=innerColSpl]{display:none;}.stats-bar{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="mon-header">
    <div class="hdr-left">
      <div class="hdr-brand">Smart<span>Clock</span></div>
      <div class="live-badge"><span class="live-dot"></span> Live</div>
    </div>
    <div class="hdr-clock" id="hdrClock">--:--:--</div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="window.location.reload()">&#8635; Refresh</button>
      <button class="hdr-btn" onclick="toggleFS()" id="fsBtn">&#x26F6; Fullscreen</button>
      <button class="hdr-btn" onclick="window.resetFvLayout&&window.resetFvLayout()" title="Reset all card sizes to default" style="opacity:0.6;font-size:0.75rem;">&#8617; Reset Layout</button>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card sc-total"><div class="sc-icon">&#128101;</div><div><div class="sc-lbl">Total Staff</div><div class="sc-val" id="sTot">0</div></div></div>
    <div class="stat-card sc-in"   ><div class="sc-icon">&#10003;</div><div><div class="sc-lbl">Clocked In</div><div class="sc-val" id="sIn">0</div></div></div>
    <div class="stat-card sc-out"  ><div class="sc-icon">&#9675;</div> <div><div class="sc-lbl">Clocked Out</div><div class="sc-val" id="sOut">0</div></div></div>
    <div class="stat-card sc-rate" ><div class="sc-icon">&#128202;</div><div><div class="sc-lbl">Attendance Rate</div><div class="sc-val" id="sRate">--%</div></div></div>
  </div>

  <!-- OUTER GRID -->
  <div class="outer-grid">

    <!-- LEFT: IN + OUT -->
    <div class="left-col">
      <div class="status-section in-section">
        <div class="status-hdr in"><span>&#9679; Clocked In</span><div style="display:flex;align-items:center;gap:0.5rem"><div class="zoom-btns"><button class="zoom-btn" onclick="pzoom('fv-in',-1)">A&#8722;</button><button class="zoom-btn" onclick="pzoom('fv-in',1)">A+</button></div><span class="status-hdr-cnt" id="inCnt">0</span></div></div>
        <div class="status-body" id="inList" data-zp="fv-in">
          <div class="no-emp"><span>&#10003;</span><span>Waiting for data&hellip;</span></div>
        </div>
      </div>
      <div class="layout-col-spl" id="innerColSpl" title="Drag to resize"></div>
      <div class="status-section out-section">
        <div class="status-hdr out"><span>&#9679; Clocked Out</span><div style="display:flex;align-items:center;gap:0.5rem"><div class="zoom-btns"><button class="zoom-btn" onclick="pzoom('fv-out',-1)">A&#8722;</button><button class="zoom-btn" onclick="pzoom('fv-out',1)">A+</button></div><span class="status-hdr-cnt" id="outCnt">0</span></div></div>
        <div class="status-body" id="outList" data-zp="fv-out">
          <div class="no-emp"><span>&#9675;</span><span>Waiting for data&hellip;</span></div>
        </div>
      </div>
    </div>

    <div class="layout-col-spl" id="outerColSpl" title="Drag to resize"></div>

    <!-- RIGHT PANEL -->
    <div class="right-col">

      <!-- Chart card -->
      <div class="rp-card" data-rk="chart">
        <div class="rp-hdr">
          <div class="rp-title">&#128202; Employee Stats</div>
          <div style="display:flex;align-items:center;gap:0.4rem">
            <div class="zoom-btns"><button class="zoom-btn" onclick="pzoom('fv-chart',-1)">A&#8722;</button><button class="zoom-btn" onclick="pzoom('fv-chart',1)">A+</button></div>
            <div class="chart-btns">
              <button class="chart-btn active" id="cBtnBar"  onclick="setChart('bar')">Bar</button>
              <button class="chart-btn"        id="cBtnHBar" onclick="setChart('horizontalBar')" >H-Bar</button>
              <button class="chart-btn"        id="cBtnDnu"  onclick="setChart('doughnut')">Donut</button>
              <button class="chart-btn"        id="cBtnPie"  onclick="setChart('pie')">Pie</button>
            </div>
          </div>
        </div>
        <div class="chart-wrap" data-zp="fv-chart">
          <canvas id="empChart" style="width:100%;height:100%;"></canvas>
          <div class="chart-empty" id="chartEmpty"><span>&#128200;</span>Waiting for data&hellip;</div>
        </div>
        <div class="layout-resize-hdl" title="Drag to resize"></div>
      </div>

      <!-- Spotlight card -->
      <div class="rp-card" data-rk="spotlight">
        <div class="rp-hdr"><div class="rp-title">&#127775; Spotlight</div><div class="zoom-btns"><button class="zoom-btn" onclick="pzoom('fv-spot',-1)">A&#8722;</button><button class="zoom-btn" onclick="pzoom('fv-spot',1)">A+</button></div></div>
        <div class="spotlight-body" id="spotlightBody" data-zp="fv-spot">
          <div class="spot-row none"><div class="spot-icon">&#8987;</div><div><div class="spot-lbl">Waiting</div><div class="spot-name">&mdash;</div></div></div>
        </div>
        <div class="layout-resize-hdl" title="Drag to resize"></div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="mon-footer">
    <div class="footer-live"><span class="footer-dot" id="footerDot"></span><span id="footerLabel">Connecting&hellip;</span></div>
    <div>Last updated: <span class="refresh-time" id="lastUpdated">&mdash;</span></div>
  </div>

</div>

<script type="module">
  import { db } from '../config/firebase.js';
  import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const ini = n => (n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const fmt = ts => { if(!ts) return "--:--"; const d=new Date(ts); return isNaN(d)?"--:--":d.toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit",hour12:false}); };
  const fmtHour = ts => { if(!ts) return 0; const d=new Date(ts); return isNaN(d)?0:parseFloat((d.getHours()+d.getMinutes()/60).toFixed(2)); };
  const now = () => new Date();

  const tickClock = () => document.getElementById("hdrClock").textContent =
    now().toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  tickClock(); setInterval(tickClock, 1000);

  const bId = new URLSearchParams(location.search).get("businessId")
           || window.businessId
           || localStorage.getItem("monitorBusinessId");
  if (bId) { localStorage.setItem("monitorBusinessId", bId); listen(); }
  else      { setError("No business ID — add ?businessId=YOUR_ID to the URL."); }

  let _chart = null, _chartType = "bar", _lastIn = [], _lastOut = [];

  function listen() {
    onSnapshot(collection(db,"businesses",bId,"status"), snap => {
      let inL=[], outL=[];
      snap.forEach(doc => {
        const d=doc.data();
        if(!d.lastClockTime && !d.active && !d.isActive) return;
        (d.attendanceStatus==="in"?inL:outL).push({id:doc.id,...d});
      });
      const bySlot=(a,b)=>(parseInt(a.slot||a.slotNumber||a.employeeId||a.id)||999)-(parseInt(b.slot||b.slotNumber||b.employeeId||b.id)||999);
      inL.sort(bySlot); outL.sort(bySlot);
      render(inL, outL); setConn(true);
    }, err => { setError(err.message); setConn(false); });
  }

  function render(inL, outL) {
    const tot=inL.length+outL.length, rate=tot>0?Math.round((inL.length/tot)*100):0;
    document.getElementById("sTot").textContent  = tot;
    document.getElementById("sIn").textContent   = inL.length;
    document.getElementById("sOut").textContent  = outL.length;
    document.getElementById("sRate").textContent = rate+"%";
    document.getElementById("inCnt").textContent  = inL.length;
    document.getElementById("outCnt").textContent = outL.length;
    document.getElementById("lastUpdated").textContent =
      now().toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});

    const mkRow = (e, sec) => {
      const slot=e.slot||e.slotNumber||e.employeeId||e.id||"?";
      const name=e.employeeName||"Slot "+slot;
      return `<div class="emp-item"><div class="emp-av">${ini(name)}</div><div class="emp-details"><div class="emp-name">${name}</div><div class="emp-slot">Slot ${slot}</div></div><div class="emp-time">${fmt(e.lastClockTime)}</div></div>`;
    };

    document.getElementById("inList").innerHTML  = inL.length  ? inL.map(e=>mkRow(e,"in")).join("")   : '<div class="no-emp"><span>&#10003;</span><span>No employees clocked in</span></div>';
    document.getElementById("outList").innerHTML = outL.length ? outL.map(e=>mkRow(e,"out")).join("") : '<div class="no-emp"><span>&#9675;</span><span>No employees clocked out</span></div>';

    updateChart(inL, outL);
    updateSpotlight(inL, outL);
  }

  window.setChart = type => {
    _chartType = type;
    ["Bar","HBar","Dnu","Pie"].forEach(k=>document.getElementById("cBtn"+k)?.classList.remove("active"));
    const map={bar:"Bar",horizontalBar:"HBar",doughnut:"Dnu",pie:"Pie"};
    document.getElementById("cBtn"+map[type])?.classList.add("active");
    updateChart(_lastIn, _lastOut);
  };

  function updateChart(inL, outL) {
    _lastIn=inL; _lastOut=outL;
    const canvas=document.getElementById("empChart"), empty=document.getElementById("chartEmpty");
    if(!canvas) return;
    const all=[...inL,...outL];
    if(!all.length){ canvas.style.display="none"; empty.style.display="flex"; if(_chart){_chart.destroy();_chart=null;} return; }
    canvas.style.display="block"; empty.style.display="none";
    const isDPie=_chartType==="doughnut"||_chartType==="pie";
    let config;
    if(isDPie){
      config={type:_chartType,data:{labels:["Clocked In","Clocked Out"],datasets:[{data:[inL.length,outL.length],backgroundColor:["rgba(34,197,94,0.75)","rgba(239,68,68,0.65)"],borderColor:["#22c55e","#ef4444"],borderWidth:2,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:11},padding:12}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed}`}}}}};
    } else {
      const isH=_chartType==="horizontalBar";
      const labels=all.map(e=>e.employeeName||("Slot "+(e.slot||e.slotNumber||"?")));
      const hours=all.map(e=>e.attendanceStatus==="in"?fmtHour(e.lastClockTime):0);
      const bgC=all.map(e=>e.attendanceStatus==="in"?"rgba(34,197,94,0.7)":"rgba(239,68,68,0.5)");
      const bdC=all.map(e=>e.attendanceStatus==="in"?"#22c55e":"#ef4444");
      const times=all.map(e=>fmt(e.lastClockTime));
      const scalesH={x:{min:0,max:24,ticks:{color:"#475569",font:{size:9}},grid:{color:"rgba(255,255,255,0.05)"},title:{display:true,text:"Hour (24h)",color:"#475569",font:{size:9}}},y:{ticks:{color:"#94a3b8",font:{size:10}},grid:{color:"rgba(255,255,255,0.05)"}}};
      const scalesV={x:{ticks:{color:"#94a3b8",font:{size:10},maxRotation:35},grid:{color:"rgba(255,255,255,0.05)"}},y:{min:0,max:24,ticks:{color:"#475569",font:{size:9}},grid:{color:"rgba(255,255,255,0.05)"},title:{display:true,text:"Hour (24h)",color:"#475569",font:{size:9}}}};
      config={type:"bar",data:{labels,datasets:[{label:"Clock-in time",data:hours,backgroundColor:bgC,borderColor:bdC,borderWidth:1.5,borderRadius:5}]},options:{indexAxis:isH?"y":"x",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{const e=all[ctx.dataIndex];return ` ${e.attendanceStatus==="in"?"&#10003; IN":"&#10005; OUT"}  ${times[ctx.dataIndex]}`;} }}},scales:isH?scalesH:scalesV}};
    }
    if(_chart){_chart.destroy();_chart=null;}
    _chart=new Chart(canvas,config);
    window._fvChart = _chart;
  }

  function updateSpotlight(inL, outL) {
    const el=document.getElementById("spotlightBody");
    if(!el) return;
    if(!inL.length&&!outL.length){ el.innerHTML='<div class="spot-row none"><div class="spot-icon">&#8987;</div><div><div class="spot-lbl">No data yet</div><div class="spot-name">&mdash;</div></div></div>'; return; }
    const topEmp=inL.length?inL.reduce((a,b)=>((a.lastClockTime||Infinity)<(b.lastClockTime||Infinity)?a:b)):null;
    const notIn=[...inL,...outL].filter(e=>e.attendanceStatus!=="in");
    const botEmp=notIn.length?notIn[0]:(inL.length?inL.reduce((a,b)=>((a.lastClockTime||0)>(b.lastClockTime||0)?a:b)):null);
    const nm=e=>e?(e.employeeName||("Slot "+(e.slot||e.slotNumber||"?"))):"&mdash;";
    const tt=e=>e?fmt(e.lastClockTime):"";
    const bs=botEmp?(botEmp.attendanceStatus==="in"?"Latest arrival":"Not clocked in"):"";
    el.innerHTML=`<div class="spot-section-lbl">&#127942; First to Arrive</div><div class="spot-row top"><div class="spot-icon">&#129351;</div><div><div class="spot-lbl">Earliest Clock-In</div><div class="spot-name">${nm(topEmp)}</div>${topEmp?`<div class="spot-time">${tt(topEmp)}</div>`:""}</div></div><div class="spot-section-lbl" style="margin-top:0.5rem">&#9888;&#65039; Needs Attention</div><div class="spot-row bot"><div class="spot-icon">&#128276;</div><div><div class="spot-lbl">${bs}</div><div class="spot-name">${nm(botEmp)}</div></div></div>`;
  }

  function setError(msg) {
    ["inList","outList"].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=`<div class="no-emp" style="color:#7f1d1d;"><span>&#9888;</span><span>${msg}</span></div>`; });
    setConn(false, msg);
  }

  function setConn(ok,lbl) {
    const dot=document.getElementById("footerDot"), label=document.getElementById("footerLabel");
    if(dot) dot.className="footer-dot"+(ok?"":" off");
    if(label) label.textContent=ok?"Live \u2014 real-time sync":(lbl||"Disconnected");
  }

  window.toggleFS=()=>{
    const el=document.documentElement, inFS=document.fullscreenElement||document.webkitFullscreenElement;
    if(!inFS)(el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
    document.getElementById("fsBtn").textContent=inFS?"\u26F6 Fullscreen":"\u2715 Exit Full";
  };
</script>

<script>
/* ── Resizable Layout (saves to localStorage key: fv_layout) ── */
(function() {
  const SK = 'fv_layout';
  const sv = JSON.parse(localStorage.getItem(SK) || '{}');
  function save() { localStorage.setItem(SK, JSON.stringify(sv)); }

  function colSplitter(splEl, leftEl, rightEl, key) {
    if (sv[key]) {
      var p = sv[key];
      leftEl.style.flex = 'none'; leftEl.style.width = p[0];
      rightEl.style.flex = 'none'; rightEl.style.width = p[1];
    }
    var sx, slw, srw;
    splEl.addEventListener('mousedown', function(e) {
      e.preventDefault();
      sx = e.clientX; slw = leftEl.offsetWidth; srw = rightEl.offsetWidth;
      splEl.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
    });
    function mm(e) {
      var dx = e.clientX - sx;
      var lw = Math.max(150, Math.min(slw + dx, slw + srw - 150));
      leftEl.style.flex = 'none'; leftEl.style.width = lw + 'px';
      rightEl.style.flex = 'none'; rightEl.style.width = (slw + srw - lw) + 'px';
    }
    function mu() {
      document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
      splEl.classList.remove('dragging');
      document.body.style.cursor = ''; document.body.style.userSelect = '';
      sv[key] = [leftEl.offsetWidth + 'px', rightEl.offsetWidth + 'px']; save();
    }
  }

  function cardResizer(cardEl, handleEl, key) {
    if (sv[key]) { cardEl.style.height = sv[key]; cardEl.style.flexShrink = '0'; }
    var sy, sh;
    handleEl.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      sy = e.clientY; sh = cardEl.offsetHeight;
      handleEl.classList.add('dragging');
      document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none';
      document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
    });
    function mm(e) {
      var h = Math.max(80, sh + (e.clientY - sy));
      cardEl.style.height = h + 'px'; cardEl.style.flexShrink = '0';
    }
    function mu() {
      document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
      handleEl.classList.remove('dragging');
      document.body.style.cursor = ''; document.body.style.userSelect = '';
      sv[key] = cardEl.offsetHeight + 'px'; save();
      if (window._fvChart) { try { window._fvChart.resize(); } catch(e){} }
    }
  }

  window.addEventListener('load', function() {
    var outerSpl = document.getElementById('outerColSpl');
    var leftCol  = document.querySelector('.left-col');
    var rightCol = document.querySelector('.right-col');
    if (outerSpl && leftCol && rightCol) colSplitter(outerSpl, leftCol, rightCol, 'outerCols');

    var innerSpl = document.getElementById('innerColSpl');
    var inSec  = document.querySelector('.in-section');
    var outSec = document.querySelector('.out-section');
    if (innerSpl && inSec && outSec) colSplitter(innerSpl, inSec, outSec, 'innerCols');

    document.querySelectorAll('.rp-card[data-rk]').forEach(function(card) {
      var h = card.querySelector('.layout-resize-hdl');
      if (h) cardResizer(card, h, 'card_' + card.dataset.rk);
    });
  });

  /* expose reset so it can be wired to a button if needed */
  window.resetFvLayout = function() {
    localStorage.removeItem(SK); location.reload();
  };

  /* ── Per-panel zoom ── */
  var ZK = 'fv_zoom';
  var zv = JSON.parse(localStorage.getItem(ZK)||'{}');
  var ZS = [0.6,0.7,0.8,0.9,1,1.12,1.25,1.4,1.6];
  function applyZoom(id) {
    var el = document.querySelector('[data-zp="'+id+'"]');
    if (!el) return;
    var idx = Math.max(0,Math.min(8,(zv[id]||4)));
    el.style.zoom = ZS[idx];
    el.style.fontSize = '';
  }
  window.pzoom = function(id, d) {
    zv[id] = Math.max(0, Math.min(8, (zv[id]||4)+d));
    localStorage.setItem(ZK, JSON.stringify(zv));
    applyZoom(id);
    if (id==='fv-chart' && window._fvChart) { try { window._fvChart.resize(); } catch(e){} }
  };
  window.addEventListener('load', function() {
    ['fv-in','fv-out','fv-chart','fv-spot'].forEach(applyZoom);
  });
})();
</script>
</body>
