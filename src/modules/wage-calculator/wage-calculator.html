<!-- Wage Calculator Module -->
<div class="wage-calculator-container" id="wageCalculatorView" style="display: none;">
  
  <!-- Header -->
  <div class="calculator-header">
    <h1>Salary Converter</h1>
  </div>

  <!-- Input Section -->
  <div class="input-section">
    <div class="input-card">
      <div class="input-group">
        <label for="salaryInput">How much is your salary?</label>
        <div class="input-with-currency">
          <span class="currency-symbol">R</span>
          <input type="number" id="salaryInput" placeholder="20,000" value="20000" step="100">
        </div>
      </div>

      <div class="input-group">
        <label for="hoursPerWeek">Your work hours per week</label>
        <input type="number" id="hoursPerWeek" value="40" min="1" max="168" step="0.5">
      </div>
    </div>
  </div>

  <!-- Results Section -->
  <div class="results-section">
    <div class="result-row">
      <span class="result-label">Yearly salary</span>
      <span class="result-value" id="yearlySalary">R 240,000</span>
    </div>
    
    <div class="result-row highlight">
      <span class="result-label">Monthly salary</span>
      <span class="result-value" id="monthlySalary">R 20,000</span>
    </div>
    
    <div class="result-row">
      <span class="result-label">Biweekly salary</span>
      <span class="result-value" id="biweeklySalary">R 9,230.77</span>
    </div>
    
    <div class="result-row">
      <span class="result-label">Weekly salary</span>
      <span class="result-value" id="weeklySalary">R 4,615.38</span>
    </div>
    
    <div class="result-row">
      <span class="result-label">Daily salary</span>
      <span class="result-value" id="dailySalary">R 923.08</span>
    </div>
    
    <div class="result-row">
      <span class="result-label">Hourly salary</span>
      <span class="result-value" id="hourlySalary">R 115.38</span>
    </div>
  </div>

  <!-- Hours Display -->
  <div class="hours-footer">
    <span class="hours-label">Your work hours per week</span>
    <span class="hours-value" id="hoursDisplay">40</span>
  </div>

</div>
